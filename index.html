<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hobi</title>
    <meta name="description" content="Studio Hobi — a design studio based in New York, run by Nick Simmons and Mara Lookabaugh." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Fonts: Cormorant Garamond (placeholder for GT Alpina) + Inter (placeholder for Tonka) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-white text-black antialiased">
    <!-- Top bar: HOBI wordmark left, tiny nav right.
         Inner div is left-anchored (no mx-auto) and capped at 1346px so on wide screens
         the wordmark stays at the left edge and white space grows on the right. -->
    <header class="pl-[17px] pr-[40px] pt-6 sm:pt-8">
      <div class="flex max-w-[1346px] items-start justify-between">
        <h1 class="font-display text-[40px] font-light leading-none tracking-tight sm:text-[54px]">
          HOBI
        </h1>
        <nav class="flex gap-8 pt-3 text-[11px] font-medium leading-[14px]">
          <a href="#about" class="transition hover:opacity-60">About</a>
          <a href="mailto:info@studiohobi.com" class="transition hover:opacity-60">info@studiohobi.com</a>
        </nav>
      </div>
    </header>

    <!-- Asymmetric staggered image grid.
         Vertical gaps use clamp(min, vw-based, max) so spacing tightens on narrow viewports. -->
    <main class="pl-[17px] pr-[40px] pt-16 sm:pt-24">
      <div class="grid max-w-[1346px] grid-cols-1 gap-x-3 gap-y-16 sm:grid-cols-[44fr_56fr] sm:gap-y-0">
        <!-- Left column -->
        <div class="flex flex-col gap-y-[clamp(80px,31vw,450px)]">
          <figure class="aspect-[579/862] w-full bg-stone-100">
            <img src="/images/01.jpg" alt="" class="h-full w-full object-cover" loading="lazy" onerror="this.style.display='none'" />
          </figure>
          <figure class="aspect-[579/892] w-full bg-stone-100">
            <img src="/images/03.jpg" alt="" class="h-full w-full object-cover" loading="lazy" onerror="this.style.display='none'" />
          </figure>
          <figure class="aspect-[579/797] w-full bg-stone-100">
            <img src="/images/05.jpg" alt="" class="h-full w-full object-cover" loading="lazy" onerror="this.style.display='none'" />
          </figure>
          <figure class="aspect-[579/743] w-full bg-stone-100">
            <img src="/images/07.jpg" alt="" class="h-full w-full object-cover" loading="lazy" onerror="this.style.display='none'" />
          </figure>
        </div>

        <!-- Right column — top offset on desktop creates the staggered rhythm.
             Both gap and offset use clamp() so they scale with viewport width. -->
        <div class="flex flex-col gap-y-[clamp(80px,31vw,450px)] sm:pt-[clamp(120px,44vw,640px)]">
          <figure class="aspect-[738/570] w-full bg-stone-100">
            <img src="/images/02.jpg" alt="" class="h-full w-full object-cover" loading="lazy" onerror="this.style.display='none'" />
          </figure>
          <figure class="aspect-[738/1011] w-full bg-stone-100">
            <img src="/images/04.jpg" alt="" class="h-full w-full object-cover" loading="lazy" onerror="this.style.display='none'" />
          </figure>
          <figure class="aspect-[738/648] w-full bg-stone-100">
            <img src="/images/06.jpg" alt="" class="h-full w-full object-cover" loading="lazy" onerror="this.style.display='none'" />
          </figure>
          <figure class="aspect-[738/1096] w-full bg-stone-100">
            <img src="/images/08.jpg" alt="" class="h-full w-full object-cover" loading="lazy" onerror="this.style.display='none'" />
          </figure>
        </div>
      </div>
    </main>

    <!-- About — anchor target for the nav link. scroll-mt offsets the snap-to position. -->
    <section id="about" class="scroll-mt-8 pl-[17px] pr-[40px] pt-32 sm:pt-48">
      <div class="max-w-[640px]">
        <h2 class="font-display text-[32px] font-light leading-none tracking-tight sm:text-[40px]">
          About
        </h2>
        <p class="mt-6 text-[15px] leading-[1.6] sm:text-base">
          Studio Hobi is a design studio based in New York and is run by Nick Simmons and Mara Lookabaugh.
        </p>
      </div>
    </section>

    <!-- Footer — left-anchored to the same gutter, no top border. -->
    <footer class="mt-32 pb-10 pl-[17px] pr-[40px] pt-10 sm:pb-14 sm:pt-14">
      <div class="flex max-w-[1346px] flex-col items-start justify-between gap-4 text-[11px] font-medium leading-[14px] sm:flex-row sm:items-end">
        <p>&copy; <span id="year"></span> Studio Hobi</p>
        <div class="flex gap-8">
          <a href="mailto:info@studiohobi.com" class="transition hover:opacity-60">info@studiohobi.com</a>
          <a href="https://instagram.com/studio_hobi" class="transition hover:opacity-60" target="_blank" rel="noopener">Instagram</a>
        </div>
      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
